<!doctype html>

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>תודה! — Cuts</title>
<style>
  @font-face { font-family: 'FbTypograph2'; src: url('assets/fonts/FbTypograph2-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
  @font-face { font-family: 'FbTypograph2'; src: url('assets/fonts/FbTypograph2-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'FbTypograph2'; src: url('assets/fonts/FbTypograph2-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
  @font-face { font-family: 'FbTypograph2'; src: url('assets/fonts/FbTypograph2-Black.otf') format('opentype'); font-weight: 900; font-display: swap; }
  :root { --accent: #FFD500; --bg: #0A0A0A; --card: #121212; --line: rgba(255,255,255,0.1); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(255,213,0,0.10), transparent 70%),
      var(--bg);
    color: rgba(255,255,255,0.85);
    font-family: 'FbTypograph2', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 28px; text-align: center;
    overflow: hidden;
  }

  /* floating ambient glow blobs */
  .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .blob--1 { width: 460px; height: 460px; background: rgba(255,213,0,0.10); top: -140px; right: -120px; animation: drift1 14s ease-in-out infinite; }
  .blob--2 { width: 380px; height: 380px; background: rgba(255,213,0,0.07); bottom: -120px; left: -100px; animation: drift2 17s ease-in-out infinite; }
  @keyframes drift1 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(-30px,40px); } }
  @keyframes drift2 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(40px,-30px); } }

  .card { max-width: 600px; position: relative; z-index: 1; }

  /* staggered entrance */
  .anim { opacity: 0; transform: translateY(18px); animation: rise 0.7s cubic-bezier(0.2,0.8,0.2,1) forwards; }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.20s; }
  .d3 { animation-delay: 0.34s; }
  .d4 { animation-delay: 0.48s; }
  .d5 { animation-delay: 0.62s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .badge {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--accent); color: #0A0A0A;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px; position: relative;
    box-shadow: 0 0 0 10px rgba(255,213,0,0.12), 0 14px 40px rgba(255,213,0,0.35);
    animation: pop 0.6s cubic-bezier(0.2,0.9,0.25,1.4) both, glow 2.6s ease-in-out 0.8s infinite;
  }
  @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 0 10px rgba(255,213,0,0.12), 0 14px 40px rgba(255,213,0,0.35); }
    50%     { box-shadow: 0 0 0 16px rgba(255,213,0,0.05), 0 18px 54px rgba(255,213,0,0.55); }
  }
  .badge::after {
    content: ""; position: absolute; inset: -6px; border-radius: 50%;
    border: 2px solid rgba(255,213,0,0.5);
    animation: ring 2.4s ease-out infinite;
  }
  @keyframes ring { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.5); opacity: 0; } }
  .badge svg { width: 48px; height: 48px;
    stroke-dasharray: 30; stroke-dashoffset: 30;
    animation: draw 0.5s ease 0.45s forwards;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  h1 { font-size: clamp(34px, 6vw, 60px); font-weight: 900; color: #fff; line-height: 1.05; margin-bottom: 16px; }
  h1 .y { color: var(--accent); }
  p { font-size: clamp(15px, 2vw, 18px); line-height: 1.65; color: rgba(255,255,255,0.7); margin-bottom: 12px; }

  .next {
    margin: 26px auto 28px; max-width: 480px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 18px 22px;
    color: rgba(255,255,255,0.8); font-size: 15px; line-height: 1.6;
  }
  .next b { color: var(--accent); }

  .ig-btn {
    display: inline-flex; align-items: center; gap: 11px;
    background: linear-gradient(95deg, #FFD500, #ffc400);
    color: #0A0A0A; font-weight: 900; font-size: 17px; text-decoration: none;
    padding: 17px 34px; border-radius: 999px;
    box-shadow: 0 14px 36px rgba(255,213,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .ig-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 46px rgba(255,213,0,0.55); }
  .ig-btn svg { width: 22px; height: 22px; }
  .ig-sub { display: block; margin-top: 16px; }
  .back { display: inline-block; margin-top: 22px; color: rgba(255,255,255,0.5); font-size: 14px; text-decoration: none; }
  .back:hover { color: var(--accent); text-decoration: underline; }
</style>

  <main class="card">

    <h1 class="anim d2"><span id="hello">קיבלנו את הפרטים</span> — <span class="y">תודה!</span></h1>
    <p class="anim d3">הפרטים שלך נקלטו. ניצור איתך קשר תוך <b style="color:var(--accent)">24 שעות</b> לתיאום שיחת אבחון קצרה (ללא עלות).</p>

    <div class="next anim d4">
      <b>בינתיים — בואו להכיר אותנו 🎙️</b><br/>
      קפצו לעמוד האינסטגרם שלנו: מאחורי הקלעים מהאולפן, פרקים, ותכל'ס איך מותג אישי נבנה. ככה תגיעו לשיחה כבר עם תמונה מלאה.
    </div>

    <div class="anim d5">
      <a class="ig-btn" id="igLink" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">

        </svg>
        עקבו אחרינו באינסטגרם
      </a>
      <a class="back ig-sub" href="index.html">← חזרה לאתר</a>
    </div>
  </main>

  <script>
    (function () {
      try {
        var n = new URLSearchParams(location.search).get("name");
